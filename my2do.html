<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>My 2Do</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="My 2Do" />
  <meta name="theme-color" content="#7c3aed" />
  <link rel="manifest" href="data:application/json,%7B%22name%22%3A%22My%202Do%22%2C%22short_name%22%3A%22My%202Do%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23ffffff%22%2C%22theme_color%22%3A%22%237c3aed%22%7D" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'DM Sans', 'Segoe UI', sans-serif; background: #f8f7ff; color: #1a1a2e; -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #f1f0fb; }
    ::-webkit-scrollbar-thumb { background: #c4b5fd; border-radius: 3px; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(40%) sepia(60%) saturate(400%) hue-rotate(230deg); }
    @keyframes fadeIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pinShake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Storage ──────────────────────────────────────────────────────────────────
const SK = { TODOS:"my2do_todos", TAGS:"my2do_tags", PIN:"my2do_pin", NOTIF:"my2do_notif" };
const load = (k, fb) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fb; } catch { return fb; } };
const save = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

// ── Helpers ──────────────────────────────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2,10);
const fmt = d => new Date(d).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
const fmtShort = d => new Date(d).toLocaleDateString("en-GB",{day:"2-digit",month:"short"});
const todayStr = () => new Date().toISOString().split("T")[0];
const addDays = (ds,n) => { const d=new Date(ds); d.setDate(d.getDate()+n); return d.toISOString().split("T")[0]; };
const diffDays = ds => Math.ceil((new Date(ds) - new Date(todayStr())) / 86400000);
const dueLabel = (ds, done) => {
  if (done) return { text:"Done", color:"#16a34a" };
  const d = diffDays(ds);
  if (d < 0) return { text:`${Math.abs(d)}d overdue`, color:"#dc2626" };
  if (d === 0) return { text:"Due today", color:"#ea580c" };
  if (d === 1) return { text:"Due tomorrow", color:"#ca8a04" };
  return { text:`${d}d left`, color:"#7c3aed" };
};

const DEFAULT_TAGS = [
  {id:"work",name:"Work",color:"#6366f1"},
  {id:"personal",name:"Personal",color:"#ec4899"},
  {id:"health",name:"Health",color:"#16a34a"},
  {id:"finance",name:"Finance",color:"#d97706"},
  {id:"home",name:"Home",color:"#0891b2"},
];

const PRIO_COLOR = { high:"#dc2626", medium:"#d97706", low:"#16a34a" };

// ── Notifications ─────────────────────────────────────────────────────────────
const NOTIF_OFFSETS = [
  {key:"7d",days:7,label:"1 week before"},
  {key:"2d",days:2,label:"2 days before"},
  {key:"1d",days:1,label:"1 day before"},
  {key:"0d",days:0,label:"Due today"},
  {key:"late",days:-1,label:"Overdue"},
];
function fireNotifications(todos) {
  if (!("Notification" in window) || Notification.permission !== "granted") return;
  const sent = load(SK.NOTIF, {});
  const tod = todayStr();
  todos.forEach(t => {
    if (t.done) return;
    NOTIF_OFFSETS.forEach(({key,days,label}) => {
      const nk = `${t.id}_${key}`;
      if (sent[nk]) return;
      const trigger = days >= 0 ? addDays(t.dueDate, -days) : addDays(t.dueDate, Math.abs(days));
      if (days < 0 && diffDays(t.dueDate) >= 0) return;
      if (trigger === tod || (days < 0 && diffDays(t.dueDate) < 0)) {
        new Notification("My 2Do", { body: `"${t.title}" — ${label}` });
        sent[nk] = true; save(SK.NOTIF, sent);
      }
    });
  });
}

// ── CSV ───────────────────────────────────────────────────────────────────────
const todosToCSV = (todos, tags) => {
  const hdr = "id,title,description,dueDate,priority,done,tags,createdAt\n";
  return hdr + todos.map(t => {
    const tnames = (t.tags||[]).map(id=>tags.find(x=>x.id===id)?.name||id).join("|");
    return [t.id,`"${(t.title||"").replace(/"/g,'""')}"`,`"${(t.description||"").replace(/"/g,'""')}"`,
      t.dueDate,t.priority,t.done,tnames,t.createdAt].join(",");
  }).join("\n");
};
const csvToTodos = (csv, tags) => {
  const lines = csv.trim().split("\n"); if (lines.length<2) return [];
  return lines.slice(1).map(line => {
    const parts = line.match(/(".*?"|[^,]+|(?<=,)(?=,)|(?<=,)$|^(?=,))/g)||[];
    const cl = s => (s||"").replace(/^"|"$/g,"").replace(/""/g,'"');
    const [id,title,desc,dueDate,priority,done,tagStr,createdAt] = parts.map(cl);
    const tagIds = (tagStr||"").split("|").filter(Boolean).map(n=>{
      const f=tags.find(t=>t.name.toLowerCase()===n.toLowerCase()); return f?f.id:null;
    }).filter(Boolean);
    return {id:id||uid(),title,description:desc,dueDate,priority:priority||"medium",
      done:done==="true",tags:tagIds,createdAt:createdAt||new Date().toISOString()};
  }).filter(t=>t.title&&t.dueDate);
};

// ── Print ─────────────────────────────────────────────────────────────────────
function printTodos(todos, tags, period) {
  const now = new Date(); let start, end;
  if (period==="week") {
    start = new Date(now); start.setDate(now.getDate()-now.getDay()+1);
    end = new Date(start); end.setDate(start.getDate()+6);
  } else {
    start = new Date(now.getFullYear(),now.getMonth(),1);
    end = new Date(now.getFullYear(),now.getMonth()+1,0);
  }
  const ss=start.toISOString().split("T")[0], es=end.toISOString().split("T")[0];
  const filtered = todos.filter(t=>t.dueDate>=ss&&t.dueDate<=es)
    .sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
  const html = `<html><head><title>My 2Do – ${period==="week"?"Weekly":"Monthly"} Tasks</title>
  <style>body{font-family:Georgia,serif;max-width:800px;margin:40px auto;color:#111}
  h1{font-size:28px;border-bottom:3px solid #7c3aed;padding-bottom:8px;color:#7c3aed}
  h2{font-size:15px;color:#666;margin-top:-8px;margin-bottom:20px}
  table{width:100%;border-collapse:collapse;margin-top:8px}
  th{background:#7c3aed;color:white;padding:10px 12px;text-align:left;font-size:13px}
  td{padding:9px 12px;border-bottom:1px solid #e5e7eb;font-size:13px;vertical-align:top}
  tr:nth-child(even) td{background:#faf9ff}
  .done{text-decoration:line-through;color:#9ca3af}
  .tag{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;margin:1px}
  .overdue{color:#dc2626;font-weight:bold}.today{color:#ea580c;font-weight:bold}
  @media print{button{display:none}}</style></head>
  <body><h1>My 2Do</h1>
  <h2>${period==="week"?`Week: ${fmt(ss)} – ${fmt(es)}`:start.toLocaleString("default",{month:"long",year:"numeric"})}</h2>
  <button onclick="window.print()" style="padding:8px 18px;background:#7c3aed;color:white;border:none;border-radius:6px;cursor:pointer;margin-bottom:16px">🖨 Print / Save PDF</button>
  <table><tr><th>Task</th><th>Due Date</th><th>Priority</th><th>Tags</th><th>Status</th></tr>
  ${filtered.length===0?'<tr><td colspan="5" style="text-align:center;color:#999;padding:24px">No tasks in this period.</td></tr>':
    filtered.map(t=>{
      const d=diffDays(t.dueDate);
      const sc=t.done?"":(d<0?"overdue":d===0?"today":"");
      const tb=(t.tags||[]).map(id=>{const tg=tags.find(x=>x.id===id);return tg?`<span class="tag" style="background:${tg.color}22;color:${tg.color};border:1px solid ${tg.color}55">${tg.name}</span>`:""}).join("");
      return `<tr><td class="${t.done?"done":""}">${t.title}${t.description?`<br><small style="color:#888">${t.description}</small>`:""}</td>
      <td class="${sc}">${fmt(t.dueDate)}</td><td style="text-transform:capitalize">${t.priority}</td>
      <td>${tb}</td><td class="${sc}">${t.done?"✓ Done":d<0?"Overdue":d===0?"Today":`${d}d left`}</td></tr>`;
    }).join("")}
  </table><p style="margin-top:32px;color:#aaa;font-size:12px">My 2Do · ${new Date().toLocaleString()}</p></body></html>`;
  const w=window.open("","_blank"); w.document.write(html); w.document.close();
}

// ══════════════════════════════════════════════════════════════════════════════
// PIN SCREEN
// ══════════════════════════════════════════════════════════════════════════════
function PinScreen({ storedPin, onUnlock, onSetPin }) {
  const [digits, setDigits] = useState([]);
  const [error, setError] = useState("");
  const [shake, setShake] = useState(false);
  const [mode, setMode] = useState(storedPin ? "enter" : "set");
  const [confirm, setConfirm] = useState(null);

  const doShake = () => { setShake(true); setTimeout(()=>setShake(false),500); };

  const press = n => {
    if (digits.length >= 4) return;
    const next = [...digits, n];
    setDigits(next);
    if (next.length === 4) setTimeout(() => complete(next), 180);
  };
  const del = () => setDigits(d => d.slice(0,-1));

  const complete = d => {
    const pin = d.join("");
    if (mode==="enter") {
      if (pin===storedPin) onUnlock();
      else { setError("Incorrect PIN"); doShake(); setDigits([]); }
    } else if (mode==="set") {
      setConfirm(pin); setMode("confirm"); setDigits([]);
    } else {
      if (pin===confirm) { onSetPin(pin); onUnlock(); }
      else { setError("PINs don't match"); doShake(); setMode("set"); setConfirm(null); setDigits([]); }
    }
  };

  const keys = [1,2,3,4,5,6,7,8,9,"",0,"⌫"];
  return (
    <div style={{minHeight:"100vh",background:"#f8f7ff",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{width:56,height:56,background:"linear-gradient(135deg,#7c3aed,#a855f7)",borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,marginBottom:12}}>✓</div>
      <div style={{fontWeight:700,fontSize:26,color:"#7c3aed",letterSpacing:1,marginBottom:4}}>My 2Do</div>
      <div style={{color:"#6b7280",fontSize:14,marginBottom:36}}>
        {mode==="enter"?"Enter your PIN":mode==="set"?"Create a 4-digit PIN":"Confirm your PIN"}
      </div>
      <div style={{display:"flex",gap:16,marginBottom:28,animation:shake?"pinShake .4s":"none"}}>
        {[0,1,2,3].map(i=>(
          <div key={i} style={{width:18,height:18,borderRadius:"50%",border:"2px solid #a855f7",
            background:digits[i]!==undefined?"#7c3aed":"transparent",transition:"background .15s"}} />
        ))}
      </div>
      {error && <div style={{color:"#dc2626",fontSize:13,marginBottom:16,fontWeight:500}}>{error}</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,76px)",gap:10}}>
        {keys.map((k,i)=>(
          <button key={i} onClick={()=>k==="⌫"?del():k!==""?press(k):null}
            style={{height:76,borderRadius:18,border:k===""?"none":"1.5px solid #e9d5ff",
              background:k===""?"transparent":"#fff",
              color:k==="⌫"?"#7c3aed":"#1a1a2e",fontSize:typeof k==="number"?24:18,
              fontFamily:"inherit",cursor:k===""?"default":"pointer",
              boxShadow:k!==""?"0 2px 8px #7c3aed18":"none",fontWeight:600,
              transition:"background .1s,transform .1s"}}
            onMouseDown={e=>{if(k!=="")e.currentTarget.style.background="#f3e8ff";}}
            onMouseUp={e=>{if(k!=="")e.currentTarget.style.background="#fff";}}
          >{k}</button>
        ))}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════════════════════════════════════
function App() {
  const [pin, setPin] = useState(()=>load(SK.PIN,""));
  const [unlocked, setUnlocked] = useState(false);
  const [todos, setTodos] = useState(()=>load(SK.TODOS,[]));
  const [tags, setTags] = useState(()=>load(SK.TAGS,DEFAULT_TAGS));
  const [view, setView] = useState("list");
  const [showForm, setShowForm] = useState(false);
  const [editTodo, setEditTodo] = useState(null);
  const [filterTag, setFilterTag] = useState("all");
  const [filterStatus, setFilterStatus] = useState("all");
  const [filterPriority, setFilterPriority] = useState("all");
  const [sortBy, setSortBy] = useState("dueDate");
  const [searchQ, setSearchQ] = useState("");
  const [calMonth, setCalMonth] = useState(()=>{const n=new Date();return{y:n.getFullYear(),m:n.getMonth()};});
  const [editTag, setEditTag] = useState(null);
  const [newTagForm, setNewTagForm] = useState(false);
  const [toast, setToast] = useState(null);
  const [showPrint, setShowPrint] = useState(false);
  const [showCSV, setShowCSV] = useState(false);
  const [changingPin, setChangingPin] = useState(false);
  const csvRef = useRef();

  useEffect(()=>save(SK.TODOS,todos),[todos]);
  useEffect(()=>save(SK.TAGS,tags),[tags]);

  useEffect(()=>{
    if (!unlocked) return;
    if ("Notification" in window && Notification.permission==="default") Notification.requestPermission();
    fireNotifications(todos);
    const iv = setInterval(()=>fireNotifications(todos),60000);
    return ()=>clearInterval(iv);
  },[unlocked,todos]);

  const toast_ = (msg,type="ok") => { setToast({msg,type}); setTimeout(()=>setToast(null),3000); };

  const saveTodo = d => {
    if (d.id) setTodos(t=>t.map(x=>x.id===d.id?d:x)); else setTodos(t=>[...t,{...d,id:uid(),createdAt:new Date().toISOString()}]);
    toast_(d.id?"Task updated":"Task added"); setShowForm(false); setEditTodo(null);
  };
  const deleteTodo = id => { setTodos(t=>t.filter(x=>x.id!==id)); toast_("Task deleted","info"); };
  const toggleDone = id => setTodos(t=>t.map(x=>x.id===id?{...x,done:!x.done}:x));

  const saveTag = d => {
    if (d.id&&tags.find(t=>t.id===d.id)) setTags(t=>t.map(x=>x.id===d.id?d:x));
    else setTags(t=>[...t,{...d,id:uid()}]);
    setEditTag(null); setNewTagForm(false);
  };
  const deleteTag = id => { setTags(t=>t.filter(x=>x.id!==id)); setTodos(t=>t.map(x=>({...x,tags:(x.tags||[]).filter(tid=>tid!==id)}))); };

  const filtered = todos.filter(t=>{
    if (filterTag!=="all"&&!(t.tags||[]).includes(filterTag)) return false;
    if (filterStatus==="done"&&!t.done) return false;
    if (filterStatus==="pending"&&t.done) return false;
    if (filterStatus==="overdue"&&(t.done||diffDays(t.dueDate)>=0)) return false;
    if (filterPriority!=="all"&&t.priority!==filterPriority) return false;
    if (searchQ&&!t.title.toLowerCase().includes(searchQ.toLowerCase())&&!(t.description||"").toLowerCase().includes(searchQ.toLowerCase())) return false;
    return true;
  }).sort((a,b)=>{
    if (sortBy==="dueDate") return a.dueDate.localeCompare(b.dueDate);
    if (sortBy==="priority") return ({high:0,medium:1,low:2}[a.priority]||1)-({high:0,medium:1,low:2}[b.priority]||1);
    if (sortBy==="title") return a.title.localeCompare(b.title);
    return 0;
  });

  const exportCSV = () => {
    const blob=new Blob([todosToCSV(todos,tags)],{type:"text/csv"});
    const url=URL.createObjectURL(blob); const a=document.createElement("a");
    a.href=url; a.download=`my2do_${todayStr()}.csv`; a.click(); URL.revokeObjectURL(url);
    toast_("CSV exported"); setShowCSV(false);
  };
  const importCSV = e => {
    const file=e.target.files[0]; if(!file) return;
    const r=new FileReader();
    r.onload=ev=>{
      const imp=csvToTodos(ev.target.result,tags);
      setTodos(t=>{const ex=new Set(t.map(x=>x.id)); return [...t,...imp.filter(x=>!ex.has(x.id))];});
      toast_(`Imported ${imp.length} tasks`);
    };
    r.readAsText(file); e.target.value=""; setShowCSV(false);
  };

  if (!unlocked) return <PinScreen storedPin={pin} onUnlock={()=>setUnlocked(true)} onSetPin={p=>{setPin(p);save(SK.PIN,p);}} />;
  if (changingPin) return <PinScreen storedPin="" onUnlock={()=>setChangingPin(false)} onSetPin={p=>{setPin(p);save(SK.PIN,p);setChangingPin(false);toast_("PIN updated");}} />;

  // ── colours / styles ────────────────────────────────────────────────────────
  const S = {
    btn: (bg="#7c3aed",col="#fff") => ({background:bg,border:"none",borderRadius:9,color:col,padding:"8px 15px",fontSize:13,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap",fontWeight:600}),
    iBtn: {background:"none",border:"none",cursor:"pointer",fontSize:16,padding:"3px 7px",borderRadius:6,fontFamily:"inherit"},
    input: {width:"100%",background:"#faf9ff",border:"1.5px solid #e9d5ff",borderRadius:10,padding:"10px 12px",color:"#1a1a2e",fontSize:14,fontFamily:"inherit",outline:"none"},
    select: {background:"#faf9ff",border:"1.5px solid #e9d5ff",borderRadius:9,padding:"8px 10px",color:"#1a1a2e",fontSize:13,fontFamily:"inherit",cursor:"pointer",outline:"none"},
    label: {fontSize:12,color:"#7c3aed",display:"block",marginBottom:5,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5},
    card: {background:"#fff",border:"1.5px solid #ede9fe",borderRadius:14,padding:"14px 16px",marginBottom:10,display:"flex",gap:12,alignItems:"flex-start",boxShadow:"0 1px 4px #7c3aed10"},
    drop: {position:"absolute",right:0,top:"calc(100% + 6px)",background:"#fff",border:"1.5px solid #ede9fe",borderRadius:12,minWidth:160,zIndex:100,overflow:"hidden",boxShadow:"0 8px 24px #7c3aed18"},
    dropItem: {display:"block",width:"100%",padding:"11px 16px",background:"none",border:"none",color:"#1a1a2e",fontSize:13,cursor:"pointer",textAlign:"left",fontFamily:"inherit"},
  };

  return (
    <div style={{minHeight:"100vh",background:"#f8f7ff",color:"#1a1a2e",fontFamily:"'DM Sans',sans-serif",paddingBottom:80}}>

      {/* Header */}
      <div style={{background:"#fff",borderBottom:"1.5px solid #ede9fe",padding:"13px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:50,boxShadow:"0 2px 8px #7c3aed0d"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:34,height:34,background:"linear-gradient(135deg,#7c3aed,#a855f7)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>✓</div>
          <span style={{fontWeight:700,fontSize:19,color:"#7c3aed",letterSpacing:0.3}}>My 2Do</span>
        </div>
        <div style={{display:"flex",gap:7,alignItems:"center"}}>
          <div style={{position:"relative"}}>
            <button onClick={()=>{setShowCSV(v=>!v);setShowPrint(false);}} style={S.btn("#f3e8ff","#7c3aed")}>⇅ CSV</button>
            {showCSV&&<div style={S.drop}>
              <button onClick={exportCSV} style={S.dropItem}>⬇ Export CSV</button>
              <label style={{...S.dropItem,cursor:"pointer"}}>⬆ Import CSV<input ref={csvRef} type="file" accept=".csv" onChange={importCSV} style={{display:"none"}}/></label>
            </div>}
          </div>
          <div style={{position:"relative"}}>
            <button onClick={()=>{setShowPrint(v=>!v);setShowCSV(false);}} style={S.btn("#f3e8ff","#7c3aed")}>🖨</button>
            {showPrint&&<div style={S.drop}>
              <button onClick={()=>{printTodos(todos,tags,"week");setShowPrint(false);}} style={S.dropItem}>This Week</button>
              <button onClick={()=>{printTodos(todos,tags,"month");setShowPrint(false);}} style={S.dropItem}>This Month</button>
            </div>}
          </div>
          <button onClick={()=>{setEditTodo(null);setShowForm(true);}} style={S.btn()}>+ Add</button>
        </div>
      </div>

      {/* Nav tabs */}
      <div style={{display:"flex",background:"#fff",borderBottom:"1.5px solid #ede9fe"}}>
        {[["list","📋 Tasks"],["calendar","📅 Calendar"],["tags","🏷 Tags"],["settings","⚙ Settings"]].map(([v,lbl])=>(
          <button key={v} onClick={()=>setView(v)} style={{flex:1,padding:"11px 0",background:"none",border:"none",
            borderBottom:`2.5px solid ${view===v?"#7c3aed":"transparent"}`,
            color:view===v?"#7c3aed":"#9ca3af",fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:view===v?700:500,transition:"color .2s"}}>
            {lbl}
          </button>
        ))}
      </div>

      {/* Toast */}
      {toast&&<div style={{position:"fixed",top:68,right:14,zIndex:200,background:toast.type==="info"?"#f3f4f6":"#f0fdf4",
        border:`1px solid ${toast.type==="info"?"#d1d5db":"#bbf7d0"}`,borderRadius:10,padding:"10px 18px",
        fontSize:13,color:toast.type==="info"?"#374151":"#166534",animation:"fadeIn .2s",boxShadow:"0 4px 12px #0001"}}>
        {toast.msg}
      </div>}

      {/* Modal */}
      {showForm&&<TodoForm todo={editTodo} tags={tags} S={S} onSave={saveTodo} onClose={()=>{setShowForm(false);setEditTodo(null);}}/>}

      {/* ── LIST ──────────────────────────────────────────────────────── */}
      {view==="list"&&(
        <div style={{padding:"14px 14px 0"}}>
          {/* Search + filters */}
          <div style={{display:"flex",gap:7,marginBottom:11,flexWrap:"wrap"}}>
            <input value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="🔍 Search tasks…" style={{...S.input,flex:1,minWidth:150}}/>
            <select value={filterTag} onChange={e=>setFilterTag(e.target.value)} style={S.select}>
              <option value="all">All Tags</option>
              {tags.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
            </select>
            <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={S.select}>
              <option value="all">All Status</option>
              <option value="pending">Pending</option>
              <option value="done">Done</option>
              <option value="overdue">Overdue</option>
            </select>
            <select value={filterPriority} onChange={e=>setFilterPriority(e.target.value)} style={S.select}>
              <option value="all">All Priority</option>
              <option value="high">High</option>
              <option value="medium">Medium</option>
              <option value="low">Low</option>
            </select>
            <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={S.select}>
              <option value="dueDate">Sort: Date</option>
              <option value="priority">Sort: Priority</option>
              <option value="title">Sort: Title</option>
            </select>
          </div>

          {/* Stats */}
          <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
            {[["Total",todos.length,"#7c3aed"],["Pending",todos.filter(t=>!t.done).length,"#d97706"],["Done",todos.filter(t=>t.done).length,"#16a34a"],["Overdue",todos.filter(t=>!t.done&&diffDays(t.dueDate)<0).length,"#dc2626"]].map(([l,n,c])=>(
              <div key={l} style={{background:"#fff",border:`1.5px solid ${c}33`,borderRadius:11,padding:"9px 14px",flex:1,minWidth:68,boxShadow:`0 1px 4px ${c}12`}}>
                <div style={{color:c,fontSize:22,fontWeight:700}}>{n}</div>
                <div style={{color:"#9ca3af",fontSize:11,fontWeight:500}}>{l}</div>
              </div>
            ))}
          </div>

          {/* Tasks */}
          {filtered.length===0?(
            <div style={{textAlign:"center",color:"#d1d5db",padding:"60px 0",fontSize:15}}>
              No tasks found.<br/><span style={{fontSize:13}}>Tap + Add to get started.</span>
            </div>
          ):filtered.map(todo=>{
            const dl=dueLabel(todo.dueDate,todo.done);
            return (
              <div key={todo.id} style={{...S.card,opacity:todo.done?0.55:1}}>
                <button onClick={()=>toggleDone(todo.id)} style={{width:22,height:22,minWidth:22,borderRadius:6,
                  border:`2px solid ${todo.done?"#16a34a":"#d1d5db"}`,background:todo.done?"#16a34a":"transparent",
                  cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",marginTop:2,color:"white",fontSize:12,flexShrink:0}}>
                  {todo.done?"✓":""}
                </button>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                    <div style={{fontWeight:600,fontSize:15,textDecoration:todo.done?"line-through":"none",color:todo.done?"#9ca3af":"#1a1a2e",wordBreak:"break-word"}}>{todo.title}</div>
                    <div style={{display:"flex",gap:4,flexShrink:0}}>
                      <button onClick={()=>{setEditTodo(todo);setShowForm(true);}} style={{...S.iBtn,color:"#7c3aed"}}>✎</button>
                      <button onClick={()=>deleteTodo(todo.id)} style={{...S.iBtn,color:"#dc2626"}}>✕</button>
                    </div>
                  </div>
                  {todo.description&&<div style={{fontSize:13,color:"#6b7280",marginTop:3}}>{todo.description}</div>}
                  <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:7,alignItems:"center"}}>
                    <span style={{fontSize:11,padding:"2px 9px",borderRadius:999,background:`${PRIO_COLOR[todo.priority]}15`,color:PRIO_COLOR[todo.priority],border:`1px solid ${PRIO_COLOR[todo.priority]}33`,textTransform:"capitalize",fontWeight:600}}>{todo.priority}</span>
                    <span style={{fontSize:11,padding:"2px 9px",borderRadius:999,background:`${dl.color}15`,color:dl.color,border:`1px solid ${dl.color}33`,fontWeight:600}}>{fmt(todo.dueDate)} · {dl.text}</span>
                    {(todo.tags||[]).map(tid=>{const tg=tags.find(x=>x.id===tid);return tg?<span key={tid} style={{fontSize:11,padding:"2px 9px",borderRadius:999,background:`${tg.color}15`,color:tg.color,border:`1px solid ${tg.color}33`,fontWeight:600}}>{tg.name}</span>:null;})}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── CALENDAR ──────────────────────────────────────────────────── */}
      {view==="calendar"&&<CalView todos={todos} tags={tags} calMonth={calMonth} setCalMonth={setCalMonth}
        onEdit={t=>{setEditTodo(t);setShowForm(true);}} onToggle={toggleDone} onDelete={deleteTodo} S={S}/>}

      {/* ── TAGS ──────────────────────────────────────────────────────── */}
      {view==="tags"&&(
        <div style={{padding:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontWeight:700,fontSize:17}}>Categories</div>
            <button onClick={()=>setNewTagForm(true)} style={S.btn()}>+ New</button>
          </div>
          {(editTag||newTagForm)&&<TagForm tag={editTag} S={S} onSave={saveTag} onClose={()=>{setEditTag(null);setNewTagForm(false);}}/>}
          {tags.map(tg=>(
            <div key={tg.id} style={{background:"#fff",border:`1.5px solid ${tg.color}44`,borderRadius:12,padding:"13px 16px",marginBottom:9,display:"flex",justifyContent:"space-between",alignItems:"center",boxShadow:`0 1px 4px ${tg.color}12`}}>
              <div style={{display:"flex",alignItems:"center",gap:11}}>
                <div style={{width:15,height:15,borderRadius:"50%",background:tg.color}}/>
                <span style={{fontWeight:600}}>{tg.name}</span>
                <span style={{fontSize:12,color:"#9ca3af"}}>{todos.filter(t=>(t.tags||[]).includes(tg.id)).length} tasks</span>
              </div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>setEditTag(tg)} style={{...S.iBtn,color:"#7c3aed"}}>✎</button>
                <button onClick={()=>deleteTag(tg.id)} style={{...S.iBtn,color:"#dc2626"}}>✕</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* ── SETTINGS ──────────────────────────────────────────────────── */}
      {view==="settings"&&(
        <div style={{padding:14}}>
          <div style={{fontWeight:700,fontSize:17,marginBottom:18}}>Settings</div>
          {[
            {label:"Change PIN",desc:"Update your app unlock PIN",action:()=>setChangingPin(true),btn:"Change"},
            {label:"Export CSV",desc:"Save all tasks as a CSV file",action:exportCSV,btn:"Export"},
            {label:"Enable Notifications",desc:"Allow reminders for due dates",action:()=>Notification.requestPermission().then(p=>toast_(`Notifications: ${p}`)),btn:"Enable"},
            {label:"Clear All Tasks",desc:"Permanently delete all tasks",action:()=>{if(window.confirm("Delete ALL tasks? Cannot be undone."))setTodos([]);},btn:"Clear",danger:true},
          ].map(item=>(
            <div key={item.label} style={{background:"#fff",border:`1.5px solid ${item.danger?"#fecaca":"#ede9fe"}`,borderRadius:12,padding:"14px 16px",marginBottom:11,display:"flex",justifyContent:"space-between",alignItems:"center",boxShadow:"0 1px 4px #0001"}}>
              <div>
                <div style={{fontWeight:600}}>{item.label}</div>
                <div style={{fontSize:12,color:"#9ca3af",marginTop:2}}>{item.desc}</div>
              </div>
              <button onClick={item.action} style={S.btn(item.danger?"#fee2e2":"#f3e8ff",item.danger?"#dc2626":"#7c3aed")}>{item.btn}</button>
            </div>
          ))}
          <div style={{marginTop:24,color:"#d1d5db",fontSize:12,textAlign:"center"}}>My 2Do · All data stored on this device only</div>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// CALENDAR VIEW
// ══════════════════════════════════════════════════════════════════════════════
function CalView({todos,tags,calMonth,setCalMonth,onEdit,onToggle,onDelete,S}) {
  const {y,m} = calMonth;
  const [sel,setSel] = useState(null);
  const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const firstDay = new Date(y,m,1).getDay();
  const dim = new Date(y,m+1,0).getDate();
  const tod = todayStr();

  const dayTodos = day => {
    const ds=`${y}-${String(m+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    return todos.filter(t=>t.dueDate===ds);
  };

  const cells=[];
  for(let i=0;i<(firstDay===0?6:firstDay-1);i++) cells.push(null);
  for(let d=1;d<=dim;d++) cells.push(d);

  const selTodos = sel?dayTodos(sel):[];

  return (
    <div style={{padding:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <button onClick={()=>setCalMonth(({y,m})=>m===0?{y:y-1,m:11}:{y,m:m-1})} style={S.btn("#f3e8ff","#7c3aed")}>‹</button>
        <div style={{fontWeight:700,fontSize:17,color:"#7c3aed"}}>{MONTHS[m]} {y}</div>
        <button onClick={()=>setCalMonth(({y,m})=>m===11?{y:y+1,m:0}:{y,m:m+1})} style={S.btn("#f3e8ff","#7c3aed")}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:3}}>
        {["M","T","W","T","F","S","S"].map((d,i)=>(
          <div key={i} style={{textAlign:"center",fontSize:11,color:"#9ca3af",padding:"3px 0",fontWeight:600}}>{d}</div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
        {cells.map((day,i)=>{
          if(!day) return <div key={`e${i}`}/>;
          const ds=`${y}-${String(m+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
          const dt=dayTodos(day);
          const isToday=ds===tod, isSel=sel===day;
          return (
            <div key={day} onClick={()=>setSel(isSel?null:day)}
              style={{background:isSel?"#f3e8ff":isToday?"#faf5ff":"#fff",
                border:`1.5px solid ${isSel?"#7c3aed":isToday?"#c4b5fd":"#ede9fe"}`,
                borderRadius:9,padding:"5px 3px",minHeight:50,cursor:"pointer",transition:"background .15s"}}>
              <div style={{textAlign:"center",fontSize:12,fontWeight:isToday?700:500,
                color:isToday?"#7c3aed":"#374151",marginBottom:3}}>{day}</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:2,justifyContent:"center"}}>
                {dt.slice(0,3).map(t=>{
                  const tg=tags.find(x=>x.id===(t.tags||[])[0]);
                  return <div key={t.id} style={{width:6,height:6,borderRadius:"50%",
                    background:t.done?"#16a34a":(!t.done&&diffDays(t.dueDate)<0)?"#dc2626":tg?.color||"#7c3aed"}}/>;
                })}
                {dt.length>3&&<div style={{fontSize:9,color:"#9ca3af"}}>+{dt.length-3}</div>}
              </div>
            </div>
          );
        })}
      </div>
      {sel&&(
        <div style={{marginTop:14}}>
          <div style={{fontWeight:600,marginBottom:9,color:"#7c3aed"}}>
            {fmtShort(`${y}-${String(m+1).padStart(2,"0")}-${String(sel).padStart(2,"0")}`)}
            {selTodos.length===0&&<span style={{color:"#9ca3af",fontWeight:400}}> — No tasks</span>}
          </div>
          {selTodos.map(todo=>{
            const dl=dueLabel(todo.dueDate,todo.done);
            return (
              <div key={todo.id} style={{background:"#fff",border:"1.5px solid #ede9fe",borderRadius:10,padding:"11px 14px",marginBottom:8,display:"flex",gap:10,alignItems:"flex-start",boxShadow:"0 1px 4px #7c3aed0d"}}>
                <button onClick={()=>onToggle(todo.id)} style={{width:20,height:20,minWidth:20,borderRadius:5,border:`2px solid ${todo.done?"#16a34a":"#d1d5db"}`,background:todo.done?"#16a34a":"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontSize:11,marginTop:1,flexShrink:0}}>{todo.done?"✓":""}</button>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:14,textDecoration:todo.done?"line-through":"none",color:todo.done?"#9ca3af":"#1a1a2e"}}>{todo.title}</div>
                  <span style={{fontSize:11,color:dl.color,fontWeight:600}}>{dl.text}</span>
                </div>
                <div style={{display:"flex",gap:5}}>
                  <button onClick={()=>onEdit(todo)} style={{...S.iBtn,color:"#7c3aed"}}>✎</button>
                  <button onClick={()=>onDelete(todo.id)} style={{...S.iBtn,color:"#dc2626"}}>✕</button>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// TODO FORM
// ══════════════════════════════════════════════════════════════════════════════
function TodoForm({todo,tags,S,onSave,onClose}) {
  const [form,setForm] = useState(todo||{title:"",description:"",dueDate:todayStr(),priority:"medium",tags:[],done:false});
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const toggleTag = id => set("tags",form.tags.includes(id)?form.tags.filter(x=>x!==id):[...form.tags,id]);
  const submit = () => { if(!form.title.trim()||!form.dueDate) return; onSave(form); };

  return (
    <div style={{position:"fixed",inset:0,background:"#0004",zIndex:100,display:"flex",alignItems:"flex-end"}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"#fff",borderTop:"2px solid #ede9fe",borderRadius:"22px 22px 0 0",padding:"24px 18px 36px",
        width:"100%",maxHeight:"88vh",overflowY:"auto",animation:"slideUp .25s ease"}}>
        <div style={{width:36,height:4,background:"#e9d5ff",borderRadius:2,margin:"0 auto 20px"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <div style={{fontWeight:700,fontSize:17,color:"#7c3aed"}}>{todo?.id?"Edit Task":"New Task"}</div>
          <button onClick={onClose} style={{...S.iBtn,fontSize:20,color:"#9ca3af"}}>✕</button>
        </div>

        <label style={S.label}>Task Title *</label>
        <input value={form.title} onChange={e=>set("title",e.target.value)} placeholder="What needs doing?"
          style={{...S.input,marginBottom:13}} autoFocus/>

        <label style={S.label}>Description</label>
        <textarea value={form.description} onChange={e=>set("description",e.target.value)} placeholder="Details (optional)"
          rows={2} style={{...S.input,resize:"vertical",marginBottom:13}}/>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11,marginBottom:13}}>
          <div>
            <label style={S.label}>Due Date *</label>
            <input type="date" value={form.dueDate} onChange={e=>set("dueDate",e.target.value)} style={S.input}/>
          </div>
          <div>
            <label style={S.label}>Priority</label>
            <select value={form.priority} onChange={e=>set("priority",e.target.value)} style={{...S.select,width:"100%"}}>
              <option value="high">🔴 High</option>
              <option value="medium">🟡 Medium</option>
              <option value="low">🟢 Low</option>
            </select>
          </div>
        </div>

        <label style={S.label}>Categories</label>
        <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:22}}>
          {tags.map(tg=>{
            const active=form.tags.includes(tg.id);
            return (
              <button key={tg.id} onClick={()=>toggleTag(tg.id)}
                style={{padding:"6px 14px",borderRadius:999,border:`1.5px solid ${tg.color}`,
                  background:active?`${tg.color}20`:"transparent",color:active?tg.color:"#9ca3af",
                  fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:active?700:500,transition:"all .15s"}}>
                {tg.name}
              </button>
            );
          })}
        </div>

        <button onClick={submit} disabled={!form.title.trim()||!form.dueDate}
          style={{width:"100%",padding:"14px",borderRadius:13,border:"none",
            background:form.title.trim()?"linear-gradient(135deg,#7c3aed,#a855f7)":"#e9d5ff",
            color:form.title.trim()?"#fff":"#a78bfa",fontWeight:700,fontSize:15,cursor:form.title.trim()?"pointer":"not-allowed",fontFamily:"inherit"}}>
          {todo?.id?"Save Changes":"Add Task"}
        </button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// TAG FORM
// ══════════════════════════════════════════════════════════════════════════════
function TagForm({tag,S,onSave,onClose}) {
  const [form,setForm] = useState(tag||{name:"",color:"#6366f1"});
  const PRESETS=["#6366f1","#ec4899","#16a34a","#d97706","#0891b2","#dc2626","#8b5cf6","#0284c7","#ea580c","#65a30d"];
  return (
    <div style={{background:"#faf9ff",border:"1.5px solid #ede9fe",borderRadius:14,padding:15,marginBottom:13}}>
      <div style={{fontWeight:600,marginBottom:11,color:"#7c3aed"}}>{tag?"Edit Category":"New Category"}</div>
      <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Category name"
        style={{...S.input,marginBottom:11}}/>
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:11}}>
        {PRESETS.map(c=>(
          <button key={c} onClick={()=>setForm(f=>({...f,color:c}))}
            style={{width:30,height:30,borderRadius:"50%",background:c,border:form.color===c?"3px solid #1a1a2e":"3px solid transparent",cursor:"pointer"}}/>
        ))}
      </div>
      <input type="color" value={form.color} onChange={e=>setForm(f=>({...f,color:e.target.value}))}
        style={{width:"100%",height:38,border:"1.5px solid #ede9fe",borderRadius:9,cursor:"pointer",marginBottom:11}}/>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>{if(form.name.trim())onSave(form);}} style={{...S.btn(),flex:1}}>Save</button>
        <button onClick={onClose} style={{...S.btn("#f3e8ff","#7c3aed"),flex:1}}>Cancel</button>
      </div>
    </div>
  );
}

// ── Mount ─────────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
